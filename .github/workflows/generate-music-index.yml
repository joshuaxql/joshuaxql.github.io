name: Generate Music Index

on:
  push:
    branches: [main]
    paths:
      - 'static/assets/music/**'
      - '!static/assets/music/tracks.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate tracks.json
        run: python scripts/generate_music_manifest.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/assets/music/tracks.json
          git diff --cached --quiet || (git commit -m "Auto-generate music tracks.json" && git push)
